    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      window.process = window.process || { env: {} };
      
      // Global Error Capture for Sandbox Stability
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        console.error("Global Error:", msg);
        const root = document.getElementById('root');
        if (root && (root.innerHTML.trim() === '' || root.innerHTML.includes('Initializing'))) {
          root.innerHTML = `
            <div style="padding: 40px; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f1f5f9; text-align: center;">
              <div style="background: white; padding: 48px; border-radius: 40px; box-shadow: 0 30px 60px -12px rgba(0,0,0,0.1); max-width: 440px; border: 1px solid #e2e8f0;">
                <div style="font-size: 64px; margin-bottom: 24px; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));">🛡️</div>
                <h1 style="font-size: 24px; font-weight: 800; color: #0f172a; margin-bottom: 12px; letter-spacing: -0.5px;">Guardian Recovery</h1>
                <p style="font-size: 15px; color: #64748b; line-height: 1.6; margin-bottom: 32px; font-weight: 500;">We detected a sync interruption. Let's restore your secure session.</p>
                <button onclick="localStorage.clear(); location.reload();" style="background: #4f46e5; color: white; border: none; padding: 18px 36px; border-radius: 20px; cursor: pointer; font-weight: 800; font-size: 14px; letter-spacing: 0.5px; text-transform: uppercase; box-shadow: 0 20px 40px -10px rgba(79, 70, 229, 0.4); width: 100%;">Hard Reset App</button>
              </div>
            </div>
          `;
        }
        return false;
      };
    </script>
